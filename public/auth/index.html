<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Business Auth</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.card {
  width:340px;
  background:#111a2e;
  padding:20px;
  border-radius:12px;
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.primary { background:#2563eb; color:white; }
.secondary { background:#334155; color:white; }

.small {
  text-align:center;
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
}

.link {
  text-align:center;
  margin-top:10px;
  cursor:pointer;
  color:#60a5fa;
}
</style>
</head>

<body>

<div class="card">

  <h2>🚀 AI Business</h2>

  <!-- LOGIN -->
  <div id="loginBox">
    <input id="loginEmail" type="email" placeholder="Email">
      <div style="position:relative;"><input id="loginPassword" type="password" placeholder="Password"><span onclick="togglePassword('loginPassword', this)" style="position:absolute;right:10px;top:10px;cursor:pointer;">👁️</span></div>

    <button class="primary" onclick="login()">Login</button>

    <div class="link" onclick="showSignup()">Create account</div>
  </div>

  <!-- SIGNUP -->
  <div id="signupBox" style="display:none;">
    <input id="username" type="text" placeholder="Username">
    <input id="signupEmail" type="email" placeholder="Email">
      <div style="position:relative;"><input id="signupPassword" type="password" placeholder="Password"><span onclick="togglePassword('signupPassword', this)" style="position:absolute;right:10px;top:10px;cursor:pointer;">👁️</span></div>
      <div style="position:relative;"><input id="confirmPassword" type="password" placeholder="Confirm Password"><span onclick="togglePassword('confirmPassword', this)" style="position:absolute;right:10px;top:10px;cursor:pointer;">👁️</span></div>

    <select id="businessType">
      <option value="">What are you using this for?</option>
      <option>Business</option>
      <option>Freelancing</option>
      <option>Startup</option>
      <option>Personal</option>
    </select>

    <button class="primary" onclick="signup()">Create Account</button>

    <div class="link" onclick="showLogin()">Back to login</div>
  </div>

</div>

<script type="module">
import { supabase } from "./supabase.js";

// SWITCH UI
window.showSignup = () => {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("signupBox").style.display = "block";
};

window.showLogin = () => {
  document.getElementById("signupBox").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
};

// LOGIN
window.login = async () => {
  const email = loginEmail.value;
  const password = loginPassword.value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);

  localStorage.setItem("user", JSON.stringify(data.user));
  window.location.href = "/dashboard";
};

// SIGNUP
window.signup = async () => {
  if (signupPassword.value !== confirmPassword.value) {
    return alert("Passwords do not match");
  }

  const { data, error } = await supabase.auth.signUp({
    email: signupEmail.value,
    password: signupPassword.value
  });

  if (error) return alert(error.message);

  alert("Account created! Please login.");
  showLogin();
};
function togglePassword(id, el) {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    el.innerHTML = "🙈";
  } else {
    input.type = "password";
    el.innerHTML = "👁️";
  }
}

</script>

</body>
</html>
