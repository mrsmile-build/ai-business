<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Business Auth</title>

<style>
body{font-family:Arial;background:#0b1220;display:flex;justify-content:center;align-items:center;height:100vh;color:white}
.card{width:340px;background:#111a2e;padding:20px;border-radius:12px}
input,select,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:none}
button{background:#2563eb;color:white;font-weight:bold}
.link{text-align:center;color:#60a5fa;cursor:pointer;margin-top:10px}
.password-box{position:relative}
.eye{position:absolute;right:10px;top:12px;cursor:pointer}
</style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Business">
  <link rel="apple-touch-icon" href="/icon.svg">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-M5CXXJ9VKF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-M5CXXJ9VKF', {
    page_title: 'AI Business',
    send_page_view: true
  });
</script>
</head>

<body>
<div class="card">
<h2>🚀 AI Business</h2>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" type="email" placeholder="Email">

<div class="password-box">
<input id="password" type="password" placeholder="Password">
<span class="eye" onclick="togglePassword('password', this)">👁️</span>
</div>

<div style="margin:10px 0;display:flex;align-items:flex-start;gap:8px">
  <input type="checkbox" id="terms_agree" style="margin-top:3px;cursor:pointer">
  <label for="terms_agree" style="font-size:12px;color:#94a3b8;cursor:pointer">
    I agree to the <a href="/terms.html" style="color:#3b82f6">Terms and Conditions</a> and <a href="/privacy.html" style="color:#3b82f6">Privacy Policy</a> of AI Business
  </label>
</div>
<p onclick="forgotPassword()" style="text-align:right;font-size:12px;color:#3b82f6;cursor:pointer;margin-bottom:8px">Forgot Password?</p>
<button onclick="login()">Login</button>
<div class="link" onclick="toggleForm()">Create account</div>
</div>

<!-- SIGNUP -->
<div id="signupBox" style="display:none;">

<input id="username" type="text" placeholder="Username">
<input id="s_email" type="email" placeholder="Email">

<div class="password-box">
<input id="s_password" type="password" placeholder="Password">
<span class="eye" onclick="togglePassword('s_password', this)">👁️</span>
</div>

<div class="password-box">
<input id="s_confirm" type="password" placeholder="Confirm Password">
<span class="eye" onclick="togglePassword('s_confirm', this)">👁️</span>
</div>

<select id="usage">
<option value="">What are you using it for?</option>
<option>Business</option>
<option>Freelancing</option>
<option>Startup</option>
<option>Personal</option>
</select>

<input id="s_phone" type="tel" placeholder="Phone Number (+234...)" style="width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:1px solid #e5e7eb;font-size:16px;box-sizing:border-box">
<select id="s_country" style="width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:1px solid #e5e7eb;font-size:16px;box-sizing:border-box;background:white;color:#333">
  <option value="">Select Country</option>
  <option value="Nigeria">🇳🇬 Nigeria</option>
  <option value="Ghana">🇬🇭 Ghana</option>
  <option value="Kenya">🇰🇪 Kenya</option>
  <option value="South Africa">🇿🇦 South Africa</option>
  <option value="Uganda">🇺🇬 Uganda</option>
  <option value="Tanzania">🇹🇿 Tanzania</option>
  <option value="Rwanda">🇷🇼 Rwanda</option>
  <option value="Ethiopia">🇪🇹 Ethiopia</option>
  <option value="Egypt">🇪🇬 Egypt</option>
  <option value="United Kingdom">🇬🇧 United Kingdom</option>
  <option value="United States">🇺🇸 United States</option>
  <option value="Canada">🇨🇦 Canada</option>
  <option value="Other">🌍 Other</option>
</select>
<div style="margin:10px 0;display:flex;align-items:flex-start;gap:8px">
  <input type="checkbox" id="signup_terms" style="margin-top:3px;cursor:pointer">
  <label for="signup_terms" style="font-size:12px;color:#94a3b8;cursor:pointer">
    I agree to the <a href="/terms.html" style="color:#3b82f6">Terms and Conditions</a> and <a href="/privacy.html" style="color:#3b82f6">Privacy Policy</a> of AI Business
  </label>
</div>
<button onclick="signup()">Create Account</button>
<div class="link" onclick="toggleForm()">Back to login</div>

</div>

</div>

<script>
import("/auth/auth.js").catch(function(e){
  var div = document.createElement("div");
  div.style.cssText = "position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:white;padding:10px;font-size:11px;z-index:99999;word-break:break-all;max-height:300px;overflow:auto";
  div.textContent = "MODULE LOAD ERROR: " + (e && e.message ? e.message : e);
  document.body.appendChild(div);
});
</script>
<script>
if(window.location.search.includes("signup=true")){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("signupBox").style.display="block";
}
</script>
</body>
</html>
