<!DOCTYPE html>
<html>
<head>
  <title>AI Business Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { width:320px; padding:20px; background:#1e293b; border-radius:10px; }
    input { width:100%; padding:10px; margin:8px 0; }
    button { width:100%; padding:10px; margin-top:10px; cursor:pointer; }
  </style>
</head>
<body>

<div class="box">
  <h2>AI Business</h2>

  <input id="email" type="email" placeholder="Email">
  
  <input id="password" type="password" placeholder="Password">

  <button onclick="togglePassword()">Show/Hide Password</button>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<script type="module">
import { supabase } from "./supabase.js";

window.togglePassword = function () {
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
};

window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);

  localStorage.setItem("user", JSON.stringify(data.user));
  window.location.href = "/dashboard";
};

window.signup = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) return alert(error.message);

  alert("Account created! Please login.");
};
</script>

</body>
</html>
