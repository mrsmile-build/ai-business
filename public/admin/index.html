<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f4f4f4; }
    .card { background:white; padding:10px; margin:10px 0; border-radius:8px; }
  </style>
</head>
<body>

<h2>📊 Admin Dashboard</h2>

<button onclick="loadUsers()">Load Users</button>
<button onclick="loadStats()">Load Stats</button>

<div id="stats"></div>
<div id="users"></div>

<script type="module">
import { supabase } from "../auth/supabase.js";

async function getToken() {
  const { data } = await supabase.auth.getSession();
  return data.session.access_token;
}

window.loadStats = async function () {
  const token = await getToken();

  const res = await fetch("/api/admin/stats", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  document.getElementById("stats").innerHTML = `
    <div class="card">
      <b>Total Users:</b> ${data.totalUsers}<br>
      <b>Pro Users:</b> ${data.proUsers}<br>
      <b>Free Users:</b> ${data.freeUsers}<br>
      <b>Total AI Usage:</b> ${data.totalUsage}
    </div>
  `;
};

window.loadUsers = async function () {
  const token = await getToken();

  const res = await fetch("/api/admin/users", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  const container = document.getElementById("users");
  container.innerHTML = "";

  data.users.forEach(u => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>Email:</b> ${u.email}<br>
      <b>Plan:</b> ${u.plan}<br>
      <b>Status:</b> ${u.status}<br>
      <b>AI Usage:</b> ${u.ai_usage}
    `;
    container.appendChild(div);
  });
};
</script>

</body>
</html>
