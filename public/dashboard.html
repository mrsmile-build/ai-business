<!DOCTYPE html>
<html>
<head>
  <title>AI Business Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family:Arial;
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    .card{
      background:#1e293b;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:6px;
    }

    button{
      width:100%;
      padding:10px;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:6px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>📊 AI Business Dashboard</h1>

  <input id="user_id" placeholder="Enter User ID (test123)">
  <button onclick="loadLeads()">Load Leads</button>

  <div class="card">
    <b>Total Leads:</b>
    <span id="total">0</span>
  </div>

  <div class="card">
    <b>Status:</b>
    <span id="status">Idle</span>
  </div>

  <div id="leads"></div>

</div>

<script>
async function loadLeads() {
  const user_id =
    document.getElementById("user_id").value.trim();

  if (!user_id) {
    alert("Enter a User ID");
    return;
  }

  document.getElementById("status").innerText =
    "Loading...";

  try {
    const res =
      await fetch("/api/leads/" + user_id);

    const data = await res.json();

    const leads = data.leads || [];

    document.getElementById("total").innerText =
      leads.length;

    document.getElementById("status").innerText =
      "Live ✔";

    document.getElementById("leads").innerHTML =
      leads.map(lead => `
        <div class="card">
          <h3>${lead.name}</h3>
          <p><b>Phone:</b> ${lead.phone}</p>
          <p><b>Message:</b> ${lead.message}</p>
          <p><b>AI Reply:</b> ${lead.ai_reply || "Not generated yet"}</p>
        </div>
      `).join("");

  } catch(err) {
    document.getElementById("status").innerText =
      "Error ❌";
  }
}
</script>

</body>
</html>
