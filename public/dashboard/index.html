<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Business Dashboard</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

.container{max-width:900px;margin:auto;}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

.menu{
  display:none;
  position:absolute;
  right:20px;
  background:#1e293b;
  border-radius:8px;
  padding:10px;
}

.menu div{
  padding:8px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

.badge{
  font-size:12px;
  background:#334155;
  padding:4px 8px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <h2>📊 Dashboard</h2>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>

  <div class="menu" id="menu">
    <div onclick="goSettings()">Settings</div>
    <div onclick="goAbout()">About</div>
    <div onclick="goPolicy()">Policy</div>
    <div onclick="logout()">Logout</div>
  </div>

  <div id="userBox" class="badge">Loading user...</div>

  <h3 id="total">Total Leads: 0</h3>

  <div id="leads"></div>

</div>

<!-- 🔥 CRITICAL: SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- your app -->
<script src="./app.js"></script>

</body>
</html>
