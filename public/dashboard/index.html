<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Business Dashboard</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
}

.menu-btn{
  font-size:24px;
  cursor:pointer;
}

.menu{
  position:absolute;
  top:40px;
  right:0;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  display:none;
  width:160px;
  z-index:999;
}

.menu div{
  padding:10px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>
<div id="app"></div>
<script src="./app.js"></script>
</body>
</html>
