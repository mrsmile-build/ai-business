<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Business Dashboard</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#status{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 AI Business Dashboard</h1>

<input id="userId" placeholder="Enter User ID">

<button onclick="loadLeads()">Load Leads</button>

<p id="total">Total Leads: 0</p>
<p id="status">Status: Idle</p>

<div id="leads"></div>

</div>

<script src="./app.js"></script>

</body>
</html>
