<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Business Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* TOP BAR (REAL FIX) */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:55px;
  background:#111827;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  z-index:1000;
}

.menu-btn{
  font-size:24px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:fixed;
  top:60px;
  right:15px;
  background:#1e293b;
  border-radius:10px;
  padding:10px;
  width:160px;
  display:none;
  z-index:1001;
}

.menu div{
  padding:10px;
  cursor:pointer;
}

.menu div:hover{
  background:#334155;
}

/* CONTENT AREA */
.content{
  padding:70px 15px 15px 15px;
}

.card{
  background:#1e293b;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>📊 Dashboard v1</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="menu" id="menu">
  <div onclick="goAbout()">About</div>
  <div onclick="goPolicy()">Policy</div>
  <div onclick="goSettings()">Settings</div>
  <div onclick="logout()">Logout</div>
</div>

<div class="content">
  <h3>Total Leads: 0</h3>
  <div id="leads"></div>
</div>

<script src="./app.js"></script>

</body>
</html>
