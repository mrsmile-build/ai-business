<!DOCTYPE html>
<html>
<head>
  <title>AI Business Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family: Arial; background:#0b1220; color:#e5e7eb; }
    .topbar { background:#111827; padding:15px; display:flex; justify-content:space-between; }
    .card { background:#111827; padding:15px; margin:10px; border-radius:10px; }
    .btn { padding:10px; border:none; border-radius:8px; cursor:pointer; }
    .primary { background:#38bdf8; }
    .danger { background:#ef4444; color:white; }
  </style>
</head>

<body>

<div class="topbar">
  <div>⚡ AI Business</div>
  <div>
    <span id="planBadge">FREE</span>
    <button class="btn danger" onclick="logout()">Logout</button>
  </div>
</div>

<div class="card">
  <button class="btn primary" onclick="loadLeads()">Refresh Leads</button>
  <button class="btn primary" onclick="openUpgrade()">Upgrade</button>
</div>

<div class="card">
  <h3>📊 Leads</h3>
  <div id="leads"></div>
</div>

<div class="card">
  <h3>🧠 AI Usage</h3>
  <p id="usage">0</p>
</div>

<div class="card">
  <h3>💰 Revenue</h3>
  <p id="revenue">₦0</p>
</div>

<!-- UPGRADE MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black;">
  <div style="background:#111827; padding:20px; margin:100px auto; width:320px; border-radius:10px;">
    <h2>Upgrade Pro</h2>

    <label>Select Currency</label><br>
    <select id="currency">
      <option value="NGN">NGN (₦)</option>
      <option value="USD">USD ($)</option>
    </select>

    <h3 id="priceText">₦5000/month</h3>

    <button class="btn primary" onclick="pay()">Pay Now</button>
    <button class="btn danger" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script type="module">
import { supabase } from "../auth/supabase.js";

let currentUser;
let currency = "NGN";

/* ---------------- INIT ---------------- */
async function init() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "/auth";
    return;
  }

  currentUser = user;

  await syncUserState();
  loadLeads(user.id);
}

/* ---------------- SYNC USER ---------------- */
async function syncUserState() {
  const session = await supabase.auth.getSession();
  const token = session.data.session.access_token;

  const res = await fetch("/api/me", {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const data = await res.json();

  if (!data.subscription) return;

  document.getElementById("planBadge").innerText =
    data.subscription.plan.toUpperCase();

  document.getElementById("usage").innerText =
    data.subscription.ai_usage || 0;

  window.userState = data;
}

/* ---------------- LEADS ---------------- */
async function loadLeads(userId) {
  const session = await supabase.auth.getSession();
  const token = session.data.session.access_token;

  const res = await fetch(`/api/leads/${userId}`, {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  const container = document.getElementById("leads");
  container.innerHTML = "";

  (data.leads || []).forEach(l => {
    const div = document.createElement("div");
    div.innerHTML = `<p><b>${l.name}</b><br>${l.message}</p>`;
    container.appendChild(div);
  });
}

/* ---------------- UPGRADE SYSTEM ---------------- */
window.openUpgrade = () => {
  document.getElementById("modal").style.display = "block";
};

window.closeModal = () => {
  document.getElementById("modal").style.display = "none";
};

document.getElementById("currency").onchange = (e) => {
  currency = e.target.value;

  if (currency === "NGN") {
    document.getElementById("priceText").innerText = "₦5000/month";
  } else {
    document.getElementById("priceText").innerText = "$5/month";
  }
};

/* ---------------- PAYSTACK ---------------- */
window.pay = async () => {
  const session = await supabase.getSession();

  const amount = currency === "NGN" ? 5000 : 5;

  const res = await fetch("/api/paystack/init", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + session.data.session.access_token
    },
    body: JSON.stringify({
      email: currentUser.email,
      amount,
      currency
    })
  });

  const data = await res.json();

  if (data.data?.authorization_url) {
    window.location.href = data.data.authorization_url;
  } else {
    alert("Payment failed");
  }
};

/* ---------------- LOGOUT ---------------- */
window.logout = async () => {
  await supabase.auth.signOut();
  window.location.href = "/auth";
};

window.loadLeads = loadLeads;

init();
</script>

</body>
</html>
