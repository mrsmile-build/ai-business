<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Business</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:fixed;
  top:60px;
  right:15px;
  background:#111827;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  width:180px;
  display:none;
  z-index:2000;
}

.menu div{
  padding:12px;
  cursor:pointer;
}

.menu div:hover{
  background:#1f2937;
}

/* CONTENT */
.container{
  padding:80px 15px 30px;
}

.card{
  background:#1e293b;
  padding:18px;
  border-radius:14px;
  margin-top:10px;
  border:1px solid rgba(255,255,255,0.05);
}

/* BUTTONS */
button {
  font-family: Arial, sans-serif;
  transition: opacity 0.15s, transform 0.15s;
}
button:active { transform: scale(0.97); opacity: 0.85; }

/* INPUTS */
input, textarea, select {
  font-family: Arial, sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, textarea:focus, select:focus {
  border-color: #3b82f6 !important;
}

/* TOPBAR LOGO */
.topbar div:first-child {
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.3px;
}

/* MENU */
.menu div {
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 14px;
  transition: background 0.15s;
}
.menu div:last-child { border-bottom: none; }
.menu div:hover { background: #1f2937; color: white; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
</style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Business">
  <link rel="apple-touch-icon" href="/icon.svg">
</head>

<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px"><span id="topbar_avatar" onclick="loadPage('profile')" style="cursor:pointer"></span><span>📊 AI Business</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="install_btn" onclick="installApp()" style="display:none;align-items:center;gap:5px;padding:5px 10px;background:linear-gradient(135deg,#3b82f6,#7c3aed);border-radius:8px;cursor:pointer;font-size:12px;color:white;font-weight:600">⬇️ Install App</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="menu">
  <div onclick="loadPage('dashboard')">Dashboard</div>
  <div onclick="loadPage('profile')">Profile</div>
  <div onclick="loadPage('analytics')">Analytics</div>
  <div onclick="loadPage('leads')">Leads</div>
  <div onclick="loadPage('aiTools')">AI Tools</div>
  <div onclick="loadPage('agents')">🤖 AI Agents</div>
  <div onclick="loadPage('leadFinder')">🎯 Lead Finder</div>
  <div onclick="loadPage('proposal')">📄 Proposal Generator</div>
  <div onclick="loadPage('revenue')">💰 Revenue</div>
  <div onclick="loadPage('subscription')">Subscription</div>
  <div onclick="loadPage('settings')">Settings</div>
  <div onclick="loadPage('support')">Help / Support</div>
  <div onclick="logout()">Logout</div>
</div>

<div id="app" class="container"></div>

<script src="./app.js"></script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(()=>console.log('SW registered'));
}
</script>
</body>
</html>
