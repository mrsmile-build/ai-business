<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Business Dashboard v1</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
}

input{width:70%;}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.status{
  margin:10px 0;
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

  <h2>📊 Dashboard v1</h2>

  <input id="userId" placeholder="Enter User ID">
  <button onclick="loadLeads()">Load Leads</button>

  <div class="status" id="status">Idle</div>

  <h3 id="total">Total Leads: 0</h3>

  <div id="leads"></div>

</div>

<script src="./app.js"></script>

</body>
</html>
