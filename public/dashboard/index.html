<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Business</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:fixed;
  top:60px;
  right:15px;
  background:#111827;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  width:180px;
  display:none;
  z-index:2000;
}

.menu div{
  padding:12px;
  cursor:pointer;
}

.menu div:hover{
  background:#1f2937;
}

/* CONTENT */
.container{
  padding:80px 15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px"><span id="topbar_avatar" onclick="loadPage('profile')" style="cursor:pointer"></span><span>📊 AI Business</span></div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">
  <div onclick="loadPage('dashboard')">Dashboard</div>
  <div onclick="loadPage('profile')">Profile</div>
  <div onclick="loadPage('analytics')">Analytics</div>
  <div onclick="loadPage('leads')">Leads</div>
  <div onclick="loadPage('aiTools')">AI Tools</div>
  <div onclick="loadPage('subscription')">Subscription</div>
  <div onclick="loadPage('settings')">Settings</div>
  <div onclick="loadPage('support')">Help / Support</div>
  <div onclick="logout()">Logout</div>
</div>

<div id="app" class="container"></div>

<script src="./app.js"></script>

</body>
</html>
