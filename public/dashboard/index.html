<html>

  background:#0f172a;

    <button onclick="logout()">Logout</button>

  <div id="userBox" class="badge">Checking user...</div>

  <h3 id="total">Total Leads: 0</h3>

  <div id="leads"></div>

<script src="./app.js"></script>
